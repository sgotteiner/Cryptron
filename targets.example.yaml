# What each sense watches. Copy to targets.yaml and edit.
# Adding a target = adding an entry. Adding a sense = adding a top-level key.
# Run all configured senses once:  python -m cryptron

telegram:
  - source_id: binance_killers        # your name for it, used everywhere in the DB
    link: "https://t.me/BinanceKillers"
    backfill: 200                     # messages to fetch on the very first run

cmc:
  - source_id: watchlist              # snapshot market state per run (ephemeral!)
    symbols: [BTC, ETH, SOL]

twitter:
  - source_id: sol_mentions           # the attention sense
    query: "$SOL OR solana"
    coin: SOL                         # stamped onto captured rows (optional)
    backfill: 50                      # latest tweets per run; size so runs overlap

reddit:                               # attention sense; public JSON, no key
  - source_id: cryptocurrency
    subreddit: CryptoCurrency

news:                                 # headlines via RSS, no key
  - source_id: cointelegraph
    url: "https://cointelegraph.com/rss"

feargreed:                            # market regime; first run backfills full history
  - source_id: alternative.me

coingecko:                            # per-coin sentiment snapshots (keyless, slow rate)
  - source_id: watchlist
    symbols: [BTC, ETH, SOL]
  - source_id: called-cohort          # every coin the groups called — the comparison cohort
    from_calls: [binance_killers]     # resolved from sense_telegram at run time
    min_mentions: 3

dex_trending:                         # GeckoTerminal trending pools; no key (gem radar)
  - source_id: trending-all           # across all networks
  - source_id: trending-solana
    network: solana                   # or eth, base, bsc, ...
